<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABYSS - مكتبة المانجا والمانهوا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* ===== نفس الـ CSS السابق بالكامل (بدون تغيير) ===== */
        :root {
            --bg-dark: #12121a;
            --bg-darker: #0a0a10;
            --bg-card: #1e1e2e;
            --bg-hover: #252540;
            --accent: #e94560;
            --accent-gold: #f5c518;
            --accent-blue: #4dabf7;
            --accent-green: #2ecc71;
            --text: #e0e0e0;
            --text-muted: #999;
            --border: #2a2a3a;
            --radius: 12px;
            --transition: 0.3s;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; scrollbar-width: thin; scrollbar-color: #444 #12121a; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #12121a; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            direction: rtl;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            height: 56px;
            background: var(--bg-darker);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 50;
            border-bottom: 1px solid var(--border);
            gap: 14px;
            flex-shrink: 0;
        }
        .menu-toggle {
            background: none; border: none; color: #fff;
            font-size: 28px; cursor: pointer; padding: 4px 10px;
            border-radius: 8px; transition: var(--transition); line-height: 1;
        }
        .menu-toggle:hover { background: var(--bg-hover); }
        .topbar .logo {
            font-size: 24px; font-weight: 900;
            background: linear-gradient(135deg, var(--accent), #ff6b8a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .topbar .spacer { flex: 1; }

        .sidebar-overlay {
            position: fixed; top: 56px; left: 0;
            width: 100%; height: calc(100% - 56px);
            background: rgba(0,0,0,0.6); z-index: 55;
            display: none; transition: opacity 0.3s;
        }
        .sidebar-overlay.show { display: block; }

        .sidebar {
            position: fixed; top: 56px; left: -280px;
            width: 260px; height: calc(100vh - 56px);
            background: var(--bg-darker); z-index: 60;
            transition: left var(--transition);
            display: flex; flex-direction: column;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            box-shadow: 5px 0 20px rgba(0,0,0,0.5);
        }
        .sidebar.open { left: 0; }
        .sidebar .side-header {
            padding: 20px 18px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .sidebar .side-logo {
            font-size: 22px; font-weight: 900;
            background: linear-gradient(135deg, var(--accent), #ff6b8a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sidebar .close-sidebar {
            background: none; border: none; color: #fff;
            font-size: 22px; cursor: pointer; padding: 4px 8px;
            border-radius: 6px; transition: var(--transition);
        }
        .sidebar .close-sidebar:hover { background: var(--bg-hover); }
        .sidebar nav { flex: 1; padding: 10px 0; }
        .sidebar nav a {
            display: flex; align-items: center; gap: 12px;
            padding: 13px 20px; color: var(--text-muted);
            text-decoration: none; font-size: 15px;
            transition: var(--transition);
            border-left: 3px solid transparent;
            cursor: pointer; margin: 2px 0;
        }
        .sidebar nav a:hover, .sidebar nav a.active {
            background: rgba(233,68,96,0.12);
            color: #fff; border-left-color: var(--accent);
        }
        .sidebar nav a .icon { font-size: 20px; width: 26px; text-align: center; }

        .sidebar .user-area { padding: 18px; border-top: 1px solid var(--border); text-align: center; }
        .sidebar .user-area .login-side-btn {
            width: 100%; background: var(--accent); color: #fff; border: none;
            padding: 11px; border-radius: 25px; cursor: pointer;
            font-size: 15px; font-weight: bold; transition: var(--transition);
            font-family: 'Cairo', sans-serif;
        }
        .sidebar .user-area .login-side-btn:hover { background: #ff5a75; }
        .sidebar .user-area .user-box {
            display: flex; align-items: center; gap: 10px;
            background: var(--bg-card); padding: 10px 14px;
            border-radius: 25px; cursor: pointer; transition: var(--transition);
        }
        .sidebar .user-area .user-box:hover { background: var(--bg-hover); }
        .sidebar .user-area .user-box .user-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: var(--accent); display: flex;
            align-items: center; justify-content: center;
            font-size: 20px; overflow: hidden; flex-shrink: 0;
        }
        .sidebar .user-area .user-box .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .sidebar .user-area .user-box .user-name {
            font-size: 14px; font-weight: bold; color: #fff;
            flex: 1; text-align: right;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .sidebar .user-area .logout-link {
            font-size: 12px; color: var(--text-muted);
            cursor: pointer; margin-top: 8px; display: inline-block;
        }
        .sidebar .user-area .logout-link:hover { color: var(--accent); }

        .main { flex: 1; overflow-y: auto; padding: 20px 24px; height: calc(100vh - 56px); }
        .page { display: none; }
        .page.active { display: block; }

        .carousel-section { margin-bottom: 28px; position: relative; }
        .carousel-container {
            position: relative; overflow: hidden;
            border-radius: var(--radius); background: var(--bg-card);
            border: 1px solid var(--border); height: 220px;
        }
        .carousel-track { display: flex; transition: transform 0.5s ease; height: 100%; }
        .carousel-slide {
            min-width: 100%; height: 100%;
            display: flex; align-items: center;
            padding: 20px 70px; gap: 24px; cursor: pointer;
        }
        .carousel-slide .slide-cover {
            width: 120px; height: 170px; border-radius: 10px;
            background: var(--bg-hover); display: flex;
            align-items: center; justify-content: center;
            font-size: 60px; color: #555; flex-shrink: 0;
            overflow: hidden; border: 2px solid var(--border);
        }
        .carousel-slide .slide-cover img { width: 100%; height: 100%; object-fit: cover; }
        .carousel-slide .slide-info { flex: 1; }
        .carousel-slide .slide-title { font-size: 20px; font-weight: 900; margin-bottom: 6px; }
        .carousel-slide .slide-meta { color: var(--text-muted); font-size: 14px; margin-bottom: 8px; }
        .carousel-slide .slide-rating { color: var(--accent-gold); font-weight: bold; font-size: 16px; }
        .carousel-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.7); color: #fff;
            border: 2px solid rgba(255,255,255,0.3);
            font-size: 22px; width: 44px; height: 44px;
            cursor: pointer; z-index: 5; border-radius: 50%;
            transition: var(--transition);
            display: flex; align-items: center; justify-content: center;
        }
        .carousel-btn:hover { background: var(--accent); border-color: var(--accent); }
        .carousel-btn.prev { right: 10px; }
        .carousel-btn.next { left: 10px; }
        .carousel-dots { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .carousel-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #555; cursor: pointer; transition: var(--transition);
        }
        .carousel-dot.active { background: var(--accent); width: 24px; border-radius: 6px; }

        .search-filter-row {
            display: flex; gap: 14px; margin-bottom: 20px;
            flex-wrap: wrap; align-items: center;
        }
        .search-box { flex: 1; min-width: 250px; position: relative; }
        .search-box input {
            width: 100%; padding: 12px 40px 12px 18px;
            border-radius: 28px; border: 1px solid var(--border);
            background: var(--bg-card); color: #fff;
            font-size: 15px; outline: none;
            transition: var(--transition);
            font-family: 'Cairo', sans-serif;
        }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(233,68,96,0.15); }
        .search-box .search-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
        .filter-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-btn {
            padding: 9px 18px; border-radius: 22px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text); cursor: pointer; font-size: 14px;
            transition: var(--transition); font-family: 'Cairo', sans-serif;
        }
        .filter-btn:hover, .filter-btn.active-filter {
            background: var(--accent); border-color: var(--accent); color: #fff;
        }

        .section-title {
            font-size: 18px; font-weight: 700;
            margin-bottom: 16px; color: #fff;
            display: flex; align-items: center; gap: 8px;
        }

        .manga-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 16px;
        }
        .manga-card {
            background: var(--bg-card); border-radius: var(--radius);
            overflow: hidden; cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border); position: relative;
        }
        .manga-card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(0,0,0,0.4); border-color: var(--accent); }
        .manga-card .cover {
            width: 100%; aspect-ratio: 3/4;
            background: var(--bg-hover);
            display: flex; align-items: center; justify-content: center;
            font-size: 48px; color: #555;
            position: relative; overflow: hidden;
        }
        .manga-card .cover img { width: 100%; height: 100%; object-fit: cover; }
        .manga-card .cover .rating-badge {
            position: absolute; top: 8px; left: 8px;
            background: rgba(0,0,0,0.8); color: var(--accent-gold);
            padding: 4px 10px; border-radius: 15px;
            font-size: 12px; font-weight: bold;
        }
        .manga-card .info { padding: 12px; }
        .manga-card .info .title {
            font-size: 14px; font-weight: bold; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 6px;
        }
        .manga-card .info .meta {
            font-size: 12px; color: var(--text-muted);
            display: flex; justify-content: space-between; align-items: center;
        }
        .manga-card .info .views { color: var(--accent-blue); font-size: 12px; }
        .quick-actions {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.9); padding: 8px;
            display: flex; flex-wrap: wrap; gap: 4px;
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none; justify-content: center;
        }
        .manga-card:hover .quick-actions { opacity: 1; pointer-events: auto; }
        .quick-btn {
            padding: 5px 10px; border-radius: 15px;
            border: 1px solid var(--border); background: transparent;
            color: #fff; cursor: pointer; font-size: 11px;
            transition: var(--transition); white-space: nowrap;
            font-family: 'Cairo', sans-serif;
        }
        .quick-btn:hover { background: var(--accent); border-color: var(--accent); }
        .quick-btn.added { background: var(--accent-green); border-color: var(--accent-green); color: #000; font-weight: bold; }

        .details-container { display: flex; gap: 30px; flex-wrap: wrap; }
        .details-cover {
            width: 240px; flex-shrink: 0; border-radius: var(--radius);
            overflow: hidden; border: 1px solid var(--border);
            aspect-ratio: 3/4; background: var(--bg-card);
            display: flex; align-items: center; justify-content: center;
            font-size: 80px; color: #555;
        }
        .details-cover img { width: 100%; height: 100%; object-fit: cover; }
        .details-info { flex: 1; min-width: 280px; }
        .details-info .manga-title { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
        .details-info .manga-author { color: var(--text-muted); margin-bottom: 10px; font-size: 15px; }
        .details-info .rating-large { font-size: 32px; color: var(--accent-gold); font-weight: bold; margin-bottom: 14px; }
        .details-info .genres { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
        .details-info .genre-tag { padding: 5px 14px; background: rgba(233,68,96,0.2); border-radius: 18px; font-size: 13px; color: var(--accent); }
        .details-info .desc { color: var(--text-muted); line-height: 1.8; margin-bottom: 20px; }
        .details-info .views-count { color: var(--accent-blue); font-size: 15px; margin-bottom: 14px; }
        .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .action-btn {
            padding: 10px 20px; border-radius: 25px;
            border: 2px solid var(--border); background: transparent;
            color: #fff; cursor: pointer; font-size: 14px;
            transition: var(--transition); font-weight: bold;
            white-space: nowrap; font-family: 'Cairo', sans-serif;
        }
        .action-btn:hover { border-color: var(--accent); color: var(--accent); }
        .action-btn.active-action { background: var(--accent); border-color: var(--accent); color: #fff; }
        .action-btn.watching-active { background: #4dabf7; border-color: #4dabf7; }
        .action-btn.completed-active { background: var(--accent-green); border-color: var(--accent-green); }
        .chapter-navigation {
            display: flex; align-items: center; gap: 15px;
            margin-bottom: 20px; background: var(--bg-card);
            padding: 14px 18px; border-radius: var(--radius);
            border: 1px solid var(--border); flex-wrap: wrap;
        }
        .nav-btn {
            background: var(--accent); color: #fff; border: none;
            padding: 9px 20px; border-radius: 22px; cursor: pointer;
            font-size: 14px; transition: var(--transition); font-weight: bold;
            font-family: 'Cairo', sans-serif;
        }
        .nav-btn:hover { background: #ff5a75; transform: scale(1.04); }
        .nav-btn:disabled { background: #444; cursor: not-allowed; transform: none; }
        .chapter-select {
            background: var(--bg-card); color: #fff;
            border: 1px solid var(--border); padding: 9px 14px;
            border-radius: 22px; font-size: 14px;
            cursor: pointer; outline: none;
            font-family: 'Cairo', sans-serif;
        }
        .chapter-list {
            background: var(--bg-card); border-radius: var(--radius);
            border: 1px solid var(--border); overflow: hidden; margin-top: 20px;
        }
        .chapter-list .ch-header { padding: 14px 18px; font-weight: bold; border-bottom: 1px solid var(--border); font-size: 16px; }
        .chapter-list .ch-item {
            padding: 12px 18px; border-bottom: 1px solid var(--border);
            cursor: pointer; transition: var(--transition);
            display: flex; justify-content: space-between; align-items: center;
        }
        .chapter-list .ch-item:hover { background: var(--bg-hover); }
        .chapter-list .ch-item.active-ch { background: rgba(233,68,96,0.2); border-right: 3px solid var(--accent); }

        .list-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .list-tab {
            padding: 10px 20px; border-radius: 22px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text); cursor: pointer; font-size: 14px;
            transition: var(--transition); font-family: 'Cairo', sans-serif;
        }
        .list-tab:hover, .list-tab.active-tab { background: var(--accent); border-color: var(--accent); color: #fff; }
        .list-tab .count { background: rgba(255,255,255,0.2); border-radius: 12px; padding: 2px 10px; margin-right: 6px; font-size: 12px; }
        .empty-list { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 17px; }
        .login-prompt {
            text-align: center; padding: 50px;
            background: var(--bg-card); border-radius: var(--radius);
            border: 1px solid var(--border); font-size: 16px; color: var(--text-muted);
        }

        .friends-container { max-width: 700px; }
        .friends-search { display: flex; gap: 10px; margin-bottom: 20px; }
        .friends-search input {
            flex: 1; padding: 12px 18px; border-radius: 28px;
            border: 1px solid var(--border); background: var(--bg-card);
            color: #fff; font-size: 15px; outline: none;
            font-family: 'Cairo', sans-serif;
        }
        .friends-search button {
            background: var(--accent); color: #fff; border: none;
            padding: 12px 24px; border-radius: 28px; cursor: pointer;
            font-size: 15px; font-weight: bold; font-family: 'Cairo', sans-serif;
        }
        .friend-card {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 18px; background: var(--bg-card);
            border-radius: var(--radius); border: 1px solid var(--border);
            margin-bottom: 10px; transition: var(--transition);
        }
        .friend-card:hover { background: var(--bg-hover); }
        .friend-card .friend-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--accent); display: flex;
            align-items: center; justify-content: center;
            font-size: 22px; overflow: hidden; flex-shrink: 0;
        }
        .friend-card .friend-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .friend-card .friend-info { flex: 1; }
        .friend-card .friend-name { font-weight: bold; font-size: 15px; }
        .friend-card .friend-meta { font-size: 12px; color: var(--text-muted); }
        .friend-card .friend-action button {
            background: transparent; border: 1px solid var(--border);
            color: #fff; padding: 7px 16px; border-radius: 20px;
            cursor: pointer; font-size: 13px; transition: var(--transition);
            font-family: 'Cairo', sans-serif;
        }
        .friend-card .friend-action button:hover { background: var(--accent); border-color: var(--accent); }

        .leaderboard-table { width: 100%; border-collapse: collapse; }
        .leaderboard-table th {
            background: var(--bg-card); padding: 14px 18px;
            text-align: right; font-size: 14px; color: var(--text-muted);
            border-bottom: 2px solid var(--border);
        }
        .leaderboard-table td {
            padding: 14px 18px; border-bottom: 1px solid var(--border);
            font-size: 14px; vertical-align: middle;
        }
        .leaderboard-table tr:hover td { background: var(--bg-hover); }
        .rank-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 34px; height: 34px; border-radius: 50%; font-weight: 900; font-size: 14px;
        }
        .rank-1 { background: linear-gradient(135deg,#f5c518,#e09b00); color: #000; }
        .rank-2 { background: linear-gradient(135deg,#c0c0c0,#888); color: #000; }
        .rank-3 { background: linear-gradient(135deg,#cd7f32,#8b4513); color: #fff; }
        .rank-other { background: var(--bg-hover); color: var(--text-muted); }
        .lb-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--accent); display: inline-flex;
            align-items: center; justify-content: center; font-size: 18px;
        }
        .lb-stat { color: var(--accent-blue); font-weight: bold; }
        .lb-stat-read { color: var(--accent-green); font-weight: bold; }

        .admin-section {
            background: var(--bg-card); border-radius: var(--radius);
            border: 1px solid var(--border); padding: 24px; margin-bottom: 20px;
        }
        .admin-section h3 { font-size: 17px; font-weight: 700; margin-bottom: 18px; color: #fff; }
        .form-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
        .form-group { flex: 1; min-width: 200px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 10px 14px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--bg-dark);
            color: #fff; font-size: 14px; outline: none;
            transition: var(--transition); font-family: 'Cairo', sans-serif;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: var(--accent); box-shadow: 0 0 0 2px rgba(233,68,96,0.15);
        }
        .form-group textarea { min-height: 90px; resize: vertical; }
        .btn-primary {
            background: var(--accent); color: #fff; border: none;
            padding: 12px 28px; border-radius: 25px; cursor: pointer;
            font-size: 15px; font-weight: bold; transition: var(--transition);
            font-family: 'Cairo', sans-serif;
        }
        .btn-primary:hover { background: #ff5a75; transform: scale(1.03); }
        .btn-danger {
            background: transparent; color: var(--accent);
            border: 1px solid var(--accent); padding: 6px 14px;
            border-radius: 18px; cursor: pointer; font-size: 12px;
            transition: var(--transition); font-family: 'Cairo', sans-serif;
        }
        .btn-danger:hover { background: var(--accent); color: #fff; }
        .chapter-builder { margin-top: 14px; }
        .chapter-entry {
            display: flex; gap: 10px; margin-bottom: 8px; align-items: center; flex-wrap: wrap;
        }
        .chapter-entry input { flex: 1; min-width: 120px; }
        .manga-list-admin { margin-top: 14px; }
        .manga-admin-item {
            display: flex; align-items: center; gap: 14px; padding: 12px 16px;
            background: var(--bg-dark); border-radius: 8px; margin-bottom: 8px;
            border: 1px solid var(--border);
        }
        .manga-admin-item .mai-title { flex: 1; font-weight: bold; font-size: 14px; }
        .manga-admin-item .mai-info { font-size: 12px; color: var(--text-muted); }
        .genre-checkboxes { display: flex; flex-wrap: wrap; gap: 8px; }
        .genre-checkbox { display: none; }
        .genre-label {
            padding: 6px 14px; border-radius: 18px;
            border: 1px solid var(--border); cursor: pointer;
            font-size: 13px; transition: var(--transition); color: var(--text-muted);
        }
        .genre-checkbox:checked + .genre-label { background: var(--accent); border-color: var(--accent); color: #fff; }
        .admin-warning {
            background: rgba(245,197,24,0.1); border: 1px solid rgba(245,197,24,0.3);
            border-radius: 8px; padding: 12px 16px; margin-bottom: 20px;
            color: var(--accent-gold); font-size: 14px;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 100;
            display: none; align-items: center; justify-content: center;
        }

    <script>
      // ==================== إعدادات Supabase ====================
        // ⚠️ استبدل هذه القيم ببيانات مشروعك من Supabase
        const SUPABASE_URL = 'https://zquyhrshnctwilxggcyi.supabase.co';  // ← غيّر هنا
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxdXlocnNobmN0d2lseGdnY3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDU3MTUsImV4cCI6MjA5NDI4MTcxNX0.En9CcuL14vXP2LlgKLsTrg1DcJSPkEnZem7E2a-lgQI';               // ← غيّر هنا
        // ✅ كلمة مرور الأدمن محفوظة في Supabase بأمان (جدول settings)

        // ==================== دوال Supabase (REST API) ====================
        const SB = {
            headers: (token) => ({
                'Content-Type': 'application/json',
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${token || SUPABASE_KEY}`
            }),

            async get(table, query = '', token = null) {
                const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
                    headers: SB.headers(token)
                });
                if (!r.ok) throw await r.json();
                return r.json();
            },

            async post(table, body, token = null) {
                const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
                    method: 'POST',
                    headers: { ...SB.headers(token), 'Prefer': 'return=representation' },
                    body: JSON.stringify(body)
                });
                if (!r.ok) throw await r.json();
                return r.json();
            },

            async patch(table, id, body, token = null) {
                const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: { ...SB.headers(token), 'Prefer': 'return=representation' },
                    body: JSON.stringify(body)
                });
                if (!r.ok) throw await r.json();
                return r.json();
            },

            async delete(table, id, token = null) {
                const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: SB.headers(token)
                });
                if (!r.ok) throw await r.json();
            }
        };

        // ==================== Supabase Auth (REST) ====================
        async function loginWithDiscord() {
            const redirectUrl = window.location.href.split('#')[0].split('?')[0];
            window.location.href = `${SUPABASE_URL}/auth/v1/authorize?provider=discord&redirect_to=${encodeURIComponent(redirectUrl)}`;
        }

        async function handleOAuthCallback() {
            const hash = window.location.hash;
            if (!hash || !hash.includes('access_token')) return false;
            const params = new URLSearchParams(hash.substring(1));
            const accessToken = params.get('access_token');
            if (!accessToken) return false;
            try {
                const r = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${accessToken}` }
                });
                if (!r.ok) return false;
                const user = await r.json();
                const meta = user.user_metadata || {};
                loggedInUser = {
                    id: user.id,
                    name: meta.full_name || meta.name || meta.user_name || user.email?.split('@')[0] || 'مستخدم',
                    avatar: meta.avatar_url || '',
                    provider: 'discord'
                };
                authToken = accessToken;
                history.replaceState(null, '', window.location.pathname + window.location.search);
                onLoginSuccess();
                showToast('✅ أهلاً ' + loggedInUser.name + ' 👋');
                return true;
            } catch (e) {
                console.error('OAuth callback error:', e);
                return false;
            }
        }

        async function signUp(email, password) {
            const r = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
                body: JSON.stringify({ email, password })
            });
            if (!r.ok) { const err = await r.json(); throw err; }
            return r.json();
        }

        async function signIn(email, password) {
            const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
                body: JSON.stringify({ email, password })
            });
            if (!r.ok) { const err = await r.json(); throw err; }
            return r.json();
        }

        // ==================== الحالة العامة للتطبيق ====================
        let mangaList = [];
        let allUsers = [];
        let currentPage = 'home';
        let currentMangaId = null;
        let currentChapterIndex = 0;
        let currentFilter = 'الكل';
        let carouselIndex = 0;
        let loggedInUser = null;
        let authToken = null;
        let userLists = { watching: [], want: [], completed: [], dropped: [] };
        let friendsList = [];
        let chapterEntryCount = 1;
        let adminAuthenticated = false;

        // ==================== التخزين المحلي ====================
        function saveToStorage() {
            localStorage.setItem('elhaweya_session', JSON.stringify({
                loggedInUser,
                authToken,
                userLists,
                friendsList,
                adminAuthenticated
            }));
        }

        function loadFromStorage() {
            const data = localStorage.getItem('elhaweya_session');
            if (data) {
                try {
                    const d = JSON.parse(data);
                    if (d.loggedInUser) loggedInUser = d.loggedInUser;
                    if (d.authToken) authToken = d.authToken;
                    if (d.userLists) userLists = d.userLists;
                    if (d.friendsList) friendsList = d.friendsList;
                    if (d.adminAuthenticated) {
                        adminAuthenticated = d.adminAuthenticated;
                        document.getElementById('adminNavLink').style.display = '';
                    }
                } catch (e) {}
            }
        }

        // ==================== تحميل البيانات من Supabase ====================
        async function loadMangaFromDB() {
            showLoading();
            try {
                const rows = await SB.get('manga', 'order=views.desc');
                mangaList = rows.map(r => ({
                    id: r.id,
                    title: r.title,
                    author: r.author,
                    cover: r.cover || '',
                    rating: r.rating,
                    genres: Array.isArray(r.genres) ? r.genres : JSON.parse(r.genres || '[]'),
                    status: r.status,
                    views: r.views || 0,
                    description: r.description,
                    chapters: Array.isArray(r.chapters) ? r.chapters : JSON.parse(r.chapters || '[]')
                }));
            } catch (e) {
                console.error('خطأ في تحميل المانجا:', e);
                showToast('❌ تأكد من إعداد Supabase في الكود');
                mangaList = [];
            }
            hideLoading();
        }

        async function loadUsersFromDB() {
            try {
                allUsers = await SB.get('users', 'order=read_count.desc');
            } catch (e) {
                allUsers = [];
            }
        }

        // ==================== إنشاء Buckets تلقائياً ====================
        async function ensureStorageBuckets() {
            for (const id of ['covers', 'chapters']) {
                try {
                    const check = await fetch(`${SUPABASE_URL}/storage/v1/bucket/${id}`, {
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                    });
                    if (check.status === 404) {
                        await fetch(`${SUPABASE_URL}/storage/v1/bucket`, {
                            method: 'POST',
                            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ id, name: id, public: true })
                        });
                    }
                } catch (e) { /* تجاهل */ }
            }
        }

                    <span class="logout-link" onclick="logout()">تسجيل خروج</span>`;
            } else {
                area.innerHTML = '<button class="login-side-btn" onclick="openLoginModal()">🔑 تسجيل الدخول</button>';
            }
        }
        function showUserMenu() {
            if (confirm(`${loggedInUser.name}\n\nهل تريد تسجيل الخروج؟`)) logout();
        }

        // ==================== التنقل بين الصفحات ====================
        function goToPage(p) {
            if (p === 'admin') {
                if (!adminAuthenticated) {
                    document.getElementById('adminPasswordModal').classList.add('show');
                    return;
                }
                document.getElementById('page-admin').style.removeProperty('display');
            } else {
                const adminPage = document.getElementById('page-admin');
                if (adminPage) adminPage.style.setProperty('display', 'none', 'important');
            }
            currentPage = p;
            document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
            const link = document.querySelector(`.sidebar nav a[data-page="${p}"]`);
            if (link) link.classList.add('active');
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            const pageEl = document.getElementById('page-' + p);
            if (pageEl) pageEl.classList.add('active');
            if (p === 'mylist') renderMyList();
            if (p === 'friends') renderFriendsPage();
            if (p === 'leaderboard') renderLeaderboard();
            if (p === 'admin') { renderAdminPanel(); switchAdminTab('publish'); }
            document.getElementById('mainContent').scrollTop = 0;
            closeSidebar();
            saveToStorage();
        }

        // ==================== دوال الأدمن (تم تعديلها بالكامل لاستخدام Supabase) ====================
        async function checkAdminPassword() {
            const email = document.getElementById('adminUsernameInput').value.trim();
            const pass = document.getElementById('adminPasswordInput').value;

            if (!email || !pass) {
                showToast('⚠️ أدخل البريد الإلكتروني وكلمة المرور');
                return;
            }

            try {
                // 1. تسجيل الدخول عبر Supabase
                const authData = await signIn(email, pass);
                if (!authData || !authData.user) {
                    showToast('❌ فشل تسجيل الدخول');
                    return;
                }

                // 2. التحقق من وجود دور المسؤول
                const roles = await SB.get(
                    'user_roles',
                    `user_id=eq.${authData.user.id}&role=eq.admin`,
                    authData.access_token   // مهم عشان RLS
                );

                if (!roles || roles.length === 0) {
                    showToast('⛔ ليس لديك صلاحيات المسؤول');
                    // نسجل خروج من الجلسة الحالية
                    await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
                        method: 'POST',
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${authData.access_token}` }
                    });
                    return;
                }

                // 3. نجاح
                adminAuthenticated = true;
                authToken = authData.access_token;
                loggedInUser = {
                    id: authData.user.id,
                    name: authData.user.email,
                    avatar: '',
                    provider: 'email'
                };

                document.getElementById('adminPasswordModal').classList.remove('show');
                document.getElementById('adminNavLink').style.display = '';
                document.getElementById('adminUsernameInput').value = '';
                document.getElementById('adminPasswordInput').value = '';
                saveToStorage();
                goToPage('admin');
                showToast('✅ أهلاً يا مسؤول 👑');

            } catch (error) {
                console.error(error);
                showToast('❌ خطأ في تسجيل الدخول: ' + (error.message || 'بيانات غير صحيحة'));
            }
        }

        function closeAdminPasswordModal() {
            document.getElementById('adminPasswordModal').classList.remove('show');
        }

        // ==================== الكاروسيل ====================
        function renderCarousel() {
            const sorted = [...mangaList].sort((a, b) => b.views - a.views);
            document.getElementById('carouselTrack').innerHTML = sorted.map(m => `
                <div class="carousel-slide" onclick="openMangaDetails(${m.id})">
                    <div class="slide-cover">${m.cover ? `<img src="${m.cover}" alt="${m.title}">` : '📖'}</div>
                    <div class="slide-info">
                        <div class="slide-title">${m.title}</div>
                        <div class="slide-meta">${m.author} · ${m.status} · 👁️ ${formatViews(m.views)}</div>
                        <div class="slide-rating">⭐ ${m.rating}</div>
                    </div>
                </div>`).join('');
            document.getElementById('carouselDots').innerHTML = sorted.map((_, i) =>
                `<div class="carousel-dot${i === 0 ? ' active' : ''}" onclick="carouselIndex=${i};updateCarousel()"></div>`
            ).join('');
            carouselIndex = 0;
            updateCarousel();
        }
        function moveCarousel(dir) {
            const total = mangaList.length;
            if (!total) return;
            carouselIndex = (carouselIndex + dir + total) % total;
            updateCarousel();
        }
        function updateCarousel() {
            const track = document.getElementById('carouselTrack');
            if (track) track.style.transform = `translateX(${carouselIndex * 100}%)`;
            document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === carouselIndex));
        }
        setInterval(() => { if (currentPage === 'home') moveCarousel(1); }, 5000);
        function formatViews(v) { return v >= 1000 ? (v / 1000).toFixed(1) + 'K' : v; }

        // ==================== شبكة المانجا ====================
        function renderMangaGrid(f = 'الكل', s = '') {
            currentFilter = f;
            const grid = document.getElementById('mangaGrid');
            let filtered = mangaList;
            if (f !== 'الكل') filtered = filtered.filter(m => m.genres.includes(f));
            if (s) {
                const t = s.toLowerCase();
                filtered = filtered.filter(m => m.title.toLowerCase().includes(t) || m.author.toLowerCase().includes(t));
            }
            grid.innerHTML = filtered.map(m => {
                const st = getMangaListStatuses(m.id);
                return `
                <div class="manga-card" onclick="openMangaDetails(${m.id})">
                    <div class="cover">
                        ${m.cover ? `<img src="${m.cover}" alt="${m.title}">` : '📖'}
                        <span class="rating-badge">⭐ ${m.rating}</span>
                    </div>
                    <div class="info">
                        <div class="title">${m.title}</div>
                        <div class="meta"><span>${m.author}</span><span class="views">👁️ ${formatViews(m.views)}</span></div>
                    </div>
                    <div class="quick-actions" onclick="event.stopPropagation();">
                        <button class="quick-btn${st.watching ? ' added' : ''}" onclick="toggleList(${m.id},'watching')">📖 ${st.watching ? '✅' : 'أشاهد'}</button>
                        <button class="quick-btn${st.want ? ' added' : ''}" onclick="toggleList(${m.id},'want')">💖 ${st.want ? '✅' : 'أرغب'}</button>
                        <button class="quick-btn${st.completed ? ' added' : ''}" onclick="toggleList(${m.id},'completed')">✅ ${st.completed ? '✅' : 'أتممت'}</button>
                    </div>
                </div>`;
            }).join('');
            if (!filtered.length) grid.innerHTML = '<p style="color:var(--text-muted);text-align:center;grid-column:1/-1;padding:40px;">لا توجد نتائج 😕</p>';
        }
        function getMangaListStatuses(id) {
            return {
                watching: (userLists.watching || []).includes(id),
                want: (userLists.want || []).includes(id),
                completed: (userLists.completed || []).includes(id),
                dropped: (userLists.dropped || []).includes(id)
            };
        }
        function toggleList(mid, lt) {
            if (!loggedInUser) { openLoginModal(); return; }
            if (!userLists[lt]) userLists[lt] = [];
            const i = userLists[lt].indexOf(mid);
            if (i > -1) {
                userLists[lt].splice(i, 1);
                showToast('🗑️ تمت الإزالة');
            } else {
                Object.keys(userLists).forEach(k => {
                    if (k !== lt && userLists[k]) userLists[k] = userLists[k].filter(id => id !== mid);
                });
                userLists[lt].push(mid);
                showToast('✅ تمت الإضافة!');
            }
            saveToStorage();
            renderMangaGrid(currentFilter, document.getElementById('searchInput')?.value || '');
            if (currentPage === 'mylist') renderMyList();
            if (currentPage === 'details' && currentMangaId === mid) {
                const m = mangaList.find(x => x.id === mid);
                if (m) renderMangaDetails(m);
            }
        }
        function setupFilters() {
            document.getElementById('filterBtns').addEventListener('click', e => {
                if (e.target.classList.contains('filter-btn')) {
                    document.querySelectorAll('#filterBtns .filter-btn').forEach(b => b.classList.remove('active-filter'));
                    e.target.classList.add('active-filter');
                    currentFilter = e.target.dataset.genre;
                    renderMangaGrid(currentFilter, document.getElementById('searchInput').value);
                }
            });
        }
        function setupSearch() {
            document.getElementById('searchInput').addEventListener('input', function() {
                renderMangaGrid(currentFilter, this.value);
            });
        }

        // ==================== صفحة التفاصيل ====================
        function openMangaDetails(id) {
            currentMangaId = id;
            const m = mangaList.find(x => x.id === id);
            if (!m) return;
            currentChapterIndex = 0;
            goToPage('details');
            renderMangaDetails(m);
        }
        function renderMangaDetails(m) {
            document.getElementById('detailsCover').innerHTML = m.cover ? `<img src="${m.cover}" alt="${m.title}">` : '📖';
            document.getElementById('detailsTitle').textContent = m.title;

            document.getElementById('detailsDesc').textContent = m.description;
            document.getElementById('adminAddChapterBtn').style.display = adminAuthenticated ? 'inline' : 'none';
            const st = getMangaListStatuses(m.id);
            document.getElementById('detailsActionButtons').innerHTML = `
                <button class="action-btn${st.watching ? ' watching-active' : ''}" onclick="toggleList(${m.id},'watching');renderMangaDetails(mangaList.find(x=>x.id===${m.id}))">📖 ${st.watching ? '✅ أشاهدها' : 'أشاهدها حاليًا'}</button>
                <button class="action-btn${st.want ? ' active-action' : ''}" onclick="toggleList(${m.id},'want');renderMangaDetails(mangaList.find(x=>x.id===${m.id}))">💖 ${st.want ? '✅ مرغوبة' : 'أرغب بمشاهدتها'}</button>
                <button class="action-btn${st.completed ? ' completed-active' : ''}" onclick="toggleList(${m.id},'completed');renderMangaDetails(mangaList.find(x=>x.id===${m.id}))">✅ ${st.completed ? '✅ مكتملة' : 'أتممت مشاهدتها'}</button>
                <button class="action-btn${st.dropped ? ' active-action' : ''}" onclick="toggleList(${m.id},'dropped');renderMangaDetails(mangaList.find(x=>x.id===${m.id}))">🚫 ${st.dropped ? '✅ مهملة' : 'لا أرغب بها'}</button>`;
            document.getElementById('chapterSelect').innerHTML = m.chapters.map((ch, i) =>
                `<option value="${i}"${i === currentChapterIndex ? ' selected' : ''}>📄 فصل ${ch.number}: ${ch.title}</option>`
            ).join('');
            renderChapterList(m);

        }
        function renderChapterList(m) {
            const sorted = m.chapters.slice().sort((a, b) => a.number - b.number);
            document.getElementById('chapterList').innerHTML = sorted.length === 0
                ? '<div style="text-align:center;padding:30px;color:var(--text-muted);">لا توجد فصول بعد</div>'
                : sorted.map(ch => {
                    const idx = m.chapters.indexOf(ch);
                    const hasPages = ch.pageUrls && ch.pageUrls.length > 0;
                    return `
                    <div class="ch-item${idx === currentChapterIndex ? ' active-ch' : ''}"
                         onclick="selectChapter(${idx})"
                         style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;border-radius:10px;margin-bottom:6px;cursor:pointer;background:var(--bg-card);border:1px solid ${idx === currentChapterIndex ? 'var(--accent)' : 'var(--border)'};transition:var(--transition);">
                        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;">
                            <span style="font-size:20px;">${hasPages ? '📖' : '📄'}</span>
                            <div>
                                <div style="font-weight:bold;font-size:14px;">فصل ${ch.number}: ${ch.title}</div>
                                <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${ch.pages || 0} صفحة${hasPages ? ' • جاهز للقراءة' : ' • لا توجد صفحات'}</div>
                            </div>
                        </div>
                        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">
                            ${hasPages
                                ? `<button onclick="event.stopPropagation();openReader(${m.id},${idx})"
                                    style="background:var(--accent);color:#fff;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-family:Cairo,sans-serif;font-size:13px;font-weight:bold;white-space:nowrap;">
                                    قراءة ▶
                                   </button>`
                                : `<span style="font-size:12px;color:var(--text-muted);padding:8px 10px;border:1px solid var(--border);border-radius:8px;">قريباً</span>`
                            }
                        </div>
                    </div>`;
                }).join('');

        // ==================== إضافة فصل لمنجا موجودة ====================
        let addChapterTargetId = null;
        function openAddChapterModal() {
            const m = mangaList.find(x => x.id === currentMangaId);
            if (!m) { showToast('⚠️ افتح صفحة المنجا أولاً'); return; }
            addChapterTargetId = m.id;
            document.getElementById('addChapterMangaName').textContent = '📚 ' + m.title;
            const maxNum = m.chapters.length ? Math.max(...m.chapters.map(c => c.number)) : 0;
            document.getElementById('newChapterNum').value = maxNum + 1;
            document.getElementById('newChapterTitle').value = '';
            document.getElementById('newChapterPages').value = '';
            document.getElementById('newChapterPageCount').textContent = '0 صفحة';
            document.getElementById('addChapterModal').classList.add('show');
        }
        async function submitNewChapter() {
            const m = mangaList.find(x => x.id === addChapterTargetId);
            if (!m) return;
            const chNum   = parseInt(document.getElementById('newChapterNum').value) || 1;
            const chTitle = document.getElementById('newChapterTitle').value.trim() || `فصل ${chNum}`;
            const filesInput = document.getElementById('newChapterPages');
            const pageFiles  = [...filesInput.files].sort((a, b) => {
                return (parseInt(a.name.match(/\d+/)?.[0] ?? '0')) - (parseInt(b.name.match(/\d+/)?.[0] ?? '0'));
            });
            if (pageFiles.length === 0) { showToast('⚠️ اختر صفحات الفصل'); return; }

            document.getElementById('addChapterModal').classList.remove('show');
            showLoading();
            showToast(`⏳ رفع فصل ${chNum} — ${pageFiles.length} صفحة...`);

            try {
                const pageUrls = [];
                const folderKey = `ch${String(chNum).padStart(3,'0')}_${Date.now()}`;
                for (let j = 0; j < pageFiles.length; j++) {
                    const ext = pageFiles[j].name.split('.').pop().toLowerCase();
                    const url = await uploadImageToSupabase(
                        pageFiles[j], 'chapters',
                        `${folderKey}/page_${String(j+1).padStart(3,'0')}.${ext}`
                    );
                    pageUrls.push(url);
                    if ((j+1) % 5 === 0) showToast(`📤 ${j+1}/${pageFiles.length} صفحة...`);
                }

                const newChapter = { number: chNum, title: chTitle, pages: pageFiles.length, pageUrls };
                m.chapters.push(newChapter);
                m.chapters.sort((a, b) => a.number - b.number);
                await SB.patch('manga', m.id, { chapters: m.chapters });

                showToast(`✅ تم رفع فصل ${chNum} بنجاح!`);
                if (currentPage === 'details' && currentMangaId === m.id) {
                    renderMangaDetails(m);
                }
                if (currentPage === 'admin') {
                    renderAdminPanel();
                }
            } catch (e) {
                showToast('❌ ' + (e.message || 'فشل الرفع').slice(0, 80));
            }
            hideLoading();
        }

        // ==================== عارض الفصول ====================
        let readerMangaId = null;
        let readerChapterIndex = 0;

        function openReader(mangaId, chapterIndex) {
            readerMangaId = mangaId;
            readerChapterIndex = chapterIndex;
            renderReader();
            goToPage('reader');
            document.getElementById('mainContent').scrollTop = 0;
        }

        function closeReader() {
            if (isReaderFullscreen) toggleReaderFullscreen();
            goToPage('details');
        }

        function renderReader() {
            const m = mangaList.find(x => x.id === readerMangaId);
            if (!m) return;
            const ch = m.chapters[readerChapterIndex];
            if (!ch) return;

            document.getElementById('readerTitle').textContent = `${m.title} — فصل ${ch.number}: ${ch.title}`;

            const hasPrev = readerChapterIndex > 0;
            const hasNext = readerChapterIndex < m.chapters.length - 1;
            ['readerPrevBtn','readerPrevBtn2'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.disabled = !hasPrev;
            });
            ['readerNextBtn','readerNextBtn2'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.disabled = !hasNext;
            });

            const urls = ch.pageUrls || [];
            if (urls.length === 0) {
                document.getElementById('readerPages').innerHTML =
                    '<div style="text-align:center;padding:60px;color:var(--text-muted);">📭 لا توجد صفحات لهذا الفصل</div>';
                return;
            }

            document.getElementById('readerPages').innerHTML = urls.map((url, i) => `
                <div style="position:relative;margin-bottom:4px;">
                    <div style="position:absolute;top:8px;right:10px;background:rgba(0,0,0,0.65);color:#fff;
                        font-size:12px;padding:2px 8px;border-radius:12px;font-family:Cairo,sans-serif;z-index:2;">
                        ${i + 1} / ${urls.length}
                    </div>
                    <img src="${url}" alt="صفحة ${i+1}"
                        loading="lazy"
                        style="width:100%;display:block;background:var(--bg-card);"
                        onerror="this.style.background='var(--bg-hover)';this.alt='❌ تعذّر تحميل الصفحة ${i+1}';">
                </div>`).join('');
        }

        function readerNavChapter(dir) {
            const m = mangaList.find(x => x.id === readerMangaId);
            if (!m) return;
            const ni = readerChapterIndex + dir;
            if (ni >= 0 && ni < m.chapters.length) {
                readerChapterIndex = ni;
                renderReader();
                document.getElementById('mainContent').scrollTop = 0;
            }
        }
        function selectChapter(i) {
            currentChapterIndex = i;
            document.getElementById('chapterSelect').value = i;
            const m = mangaList.find(x => x.id === currentMangaId);
            if (m) { renderChapterList(m); updateNavButtons(m); }
        }
        function jumpToChapter(v) { selectChapter(parseInt(v)); }
        function navigateChapter(d) {
            const m = mangaList.find(x => x.id === currentMangaId);
            if (m) {
                const ni = currentChapterIndex + d;
                if (ni >= 0 && ni < m.chapters.length) selectChapter(ni);
            }
        }
        function updateNavButtons(m) {
            document.getElementById('prevChapterBtn').disabled = currentChapterIndex === 0;
            document.getElementById('nextChapterBtn').disabled = currentChapterIndex === m.chapters.length - 1;
        }

        // ==================== مكتبتي ====================

            if (!loggedInUser) {
                container.innerHTML = '<div class="login-prompt">🔒 يرجى <button onclick="openLoginModal()" style="background:var(--accent);color:#fff;border:none;padding:10px 28px;border-radius:25px;cursor:pointer;font-size:15px;margin-top:14px;font-family:Cairo,sans-serif;">تسجيل الدخول</button> لعرض مكتبتك الشخصية</div>';

                : '<div class="manga-grid" style="margin-top:10px;">' + items.map(m => `
                    <div class="manga-card" onclick="openMangaDetails(${m.id})">

                        <div class="info"><div class="title">${m.title}</div><div class="meta">${m.author} · 👁️ ${formatViews(m.views)}</div></div>
                    </div>`).join('') + '</div>';

        // ==================== المتصدرون ====================
        function renderLeaderboard() {
            const container = document.getElementById('leaderboardContent');

            if (loggedInUser && !players.find(p => p.id === loggedInUser.id)) {
                players.push({

        // ==================== الأصدقاء ====================
        function renderFriendsPage() {
            const container = document.getElementById('friendsContainer');

        async function uploadImageToSupabase(file, bucket, path) {
            const cleanPath = path
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[\u0600-\u06FF]/g, '')
                .replace(/[^a-zA-Z0-9/_.\-]/g, '')
                .replace(/\/+/g, '/')
                .replace(/^\//, '');
            const r = await fetch(`${SUPABASE_URL}/storage/v1/object/${bucket}/${cleanPath}`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': file.type,
                    'x-upsert': 'true'
                },
                body: file
            });
            if (!r.ok) {
                const err = await r.json().catch(() => ({}));
                throw new Error(err.message || `Upload failed: ${r.status}`);
            }
            return `${SUPABASE_URL}/storage/v1/object/public/${bucket}/${cleanPath}`;
        }

        async function adminAddManga() {
            const titleEl  = document.getElementById('adminTitle');
            const authorEl = document.getElementById('adminAuthor');
            const descEl   = document.getElementById('adminDesc');
            const title  = titleEl  ? titleEl.value.trim()  : '';
            const author = authorEl ? authorEl.value.trim() : '';
            const desc   = descEl   ? descEl.value.trim()   : '';

            if (!title)  { showToast('⚠️ أدخل اسم العمل');   titleEl?.focus();  return; }
            if (!author) { showToast('⚠️ أدخل اسم المؤلف'); authorEl?.focus(); return; }
            if (!desc)   { showToast('⚠️ أدخل وصف العمل');  descEl?.focus();   return; }

            const rating = parseFloat(document.getElementById('adminRating')?.value) || 8.0;
            const status = document.getElementById('adminStatus')?.value || 'مستمر';
            const genres = [...document.querySelectorAll('.genre-checkbox:checked')].map(g => g.value);
            if (!genres.length) { showToast('⚠️ اختر تصنيفًا على الأقل'); return; }

            showLoading();
            showToast('⏳ جاري رفع الملفات...');

            try {
                let coverUrl = document.getElementById('adminCover')?.value.trim() || '';
                const coverFile = document.getElementById('adminCoverFile')?.files[0];
                if (coverFile) {
                    const ext = coverFile.name.split('.').pop().toLowerCase();
                    coverUrl = await uploadImageToSupabase(
                        coverFile, 'covers',
                        `cover_${Date.now()}.${ext}`
                    );
                    showToast('✅ تم رفع الغلاف');
                }

                const chapters = [];
                for (const entry of document.querySelectorAll('.chapter-entry')) {
                    const numInput  = entry.querySelector('input[type="number"]');
                    const textInput = entry.querySelector('input[type="text"]');
                    const filesInput = entry.querySelector('.chapter-pages-input');
                    const chNum   = parseInt(numInput?.value)  || 1;
                    const chTitle = textInput?.value.trim()     || `فصل ${chNum}`;

                    const rawFiles  = filesInput ? [...filesInput.files] : [];
                    const pageFiles = rawFiles.sort((a, b) => {
                        const numA = parseInt(a.name.match(/\d+/)?.[0] ?? '0');
                        const numB = parseInt(b.name.match(/\d+/)?.[0] ?? '0');
                        return numA - numB;
                    });

                    const pageUrls = [];
                    if (pageFiles.length > 0) {
                        showToast(`⏳ رفع فصل ${chNum} — ${pageFiles.length} صفحة...`);
                        const folderKey = `ch${String(chNum).padStart(3,'0')}_${Date.now()}`;
                        for (let j = 0; j < pageFiles.length; j++) {
                            const ext = pageFiles[j].name.split('.').pop().toLowerCase();
                            const url = await uploadImageToSupabase(
                                pageFiles[j], 'chapters',
                                `${folderKey}/page_${String(j+1).padStart(3,'0')}.${ext}`
                            );
                            pageUrls.push(url);
                            if ((j+1) % 5 === 0) showToast(`📤 ${j+1}/${pageFiles.length} صفحة...`);
                        }
                    }
                    chapters.push({ number: chNum, title: chTitle, pages: pageFiles.length, pageUrls });
                }

                const result = await SB.post('manga', {
                    title, author,
                    cover: coverUrl,
                    rating, genres, status,
                    views: 0, description: desc, chapters
                });

                if (!result || !result[0]) throw new Error('لم يُرجع Supabase بيانات — تأكد من جدول manga والـ RLS');
                mangaList.push(result[0]);
                showToast('✅ تمت إضافة العمل بنجاح!');

                ['adminTitle','adminAuthor','adminCover','adminDesc'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.value = '';
                });
                const ratingEl = document.getElementById('adminRating');
                if (ratingEl) ratingEl.value = '8.0';
                const coverFileEl = document.getElementById('adminCoverFile');
                if (coverFileEl) coverFileEl.value = '';
                const prevEl = document.getElementById('coverPreview');
                if (prevEl) prevEl.style.display = 'none';
                document.querySelectorAll('.genre-checkbox').forEach(c => c.checked = false);
                document.getElementById('chapterBuilder').innerHTML = buildFirstChapterEntry();
                chapterEntryCount = 1;

                renderAdminPanel();
                renderCarousel();
                renderMangaGrid(currentFilter);

            } catch (e) {
                console.error('adminAddManga error:', e);
                const msg = e?.message || e?.error_description || JSON.stringify(e);
                showToast('❌ ' + msg.slice(0, 80));
            }
            hideLoading();
        }

        function handlePublishFiles(files) {
            publishSelectedFiles = Array.from(files).sort((a, b) => {
                return (parseInt(a.name.match(/\d+/)?.[0] ?? '0')) - (parseInt(b.name.match(/\d+/)?.[0] ?? '0'));
            });
            const preview = document.getElementById('publishPagesPreview');
            const countEl = document.getElementById('publishPageCount');
            if (countEl) countEl.textContent = publishSelectedFiles.length + ' صفحة محددة';

            if (!preview) return;
            preview.innerHTML = '';
            publishSelectedFiles.slice(0, 20).forEach((f, i) => {
                const div = document.createElement('div');
                div.className = 'thumb';
                const url = URL.createObjectURL(f);
                div.innerHTML = `<img src="${url}" loading="lazy"><span class="thumb-num">${i+1}</span>`;
                preview.appendChild(div);
            });
            if (publishSelectedFiles.length > 20) {
                const more = document.createElement('div');
                more.className = 'thumb';
                more.innerHTML = `<span style="font-size:12px;color:var(--text-muted);">+${publishSelectedFiles.length - 20}</span>`;
                preview.appendChild(more);
            }

            const zone = document.getElementById('publishDropZone');
            if (zone) { zone.querySelector('.upload-label').textContent = publishSelectedFiles.length + ' صورة جاهزة'; }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const zone = document.getElementById('publishDropZone');
            if (!zone) return;
            zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
            zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
            zone.addEventListener('drop', e => {
                e.preventDefault(); zone.classList.remove('drag-over');
                handlePublishFiles(e.dataTransfer.files);
            });
        });

        async function publishChapter() {
            const selEl = document.getElementById('publishMangaSelect');
            if (!selEl || !selEl.value) { showToast('⚠️ اختر العمل أولاً'); return; }
            const m = mangaList.find(x => x.id == selEl.value);
            if (!m) { showToast('⚠️ العمل غير موجود'); return; }
            if (!publishSelectedFiles.length) { showToast('⚠️ اختر صفحات الفصل'); return; }

            const chNum = parseInt(document.getElementById('publishChNum').value) || 1;
            const chTitle = document.getElementById('publishChTitle').value.trim() || `فصل ${chNum}`;
            const isLocked = document.getElementById('publishLockToggle').checked;
            const lockCoin = isLocked ? publishSelectedCoin : 0;

            showLoading();
            showToast(`⏳ رفع فصل ${chNum} — ${publishSelectedFiles.length} صفحة...`);

            try {
                const pageUrls = [];
                const folderKey = `ch${String(chNum).padStart(3,'0')}_${Date.now()}`;
                for (let j = 0; j < publishSelectedFiles.length; j++) {
                    const ext = publishSelectedFiles[j].name.split('.').pop().toLowerCase();
                    const url = await uploadImageToSupabase(
                        publishSelectedFiles[j], 'chapters',
                        `${folderKey}/page_${String(j+1).padStart(3,'0')}.${ext}`
                    );
                    pageUrls.push(url);
                    if ((j+1) % 5 === 0) showToast(`📤 ${j+1}/${publishSelectedFiles.length} صفحة...`);
                }

                const newChapter = {
                    number: chNum, title: chTitle,
                    pages: publishSelectedFiles.length, pageUrls,
                    locked: isLocked, lockCoin
                };
                m.chapters.push(newChapter);
                m.chapters.sort((a, b) => a.number - b.number);
                await SB.patch('manga', m.id, { chapters: m.chapters });

                showToast(`✅ تم نشر فصل ${chNum} بنجاح! 🚀`);

                publishSelectedFiles = [];
                document.getElementById('publishPagesPreview').innerHTML = '';
                document.getElementById('publishPageCount').textContent = '';
                document.getElementById('publishChTitle').value = '';
                document.getElementById('publishDropZone').querySelector('.upload-label').textContent = 'اسحب الصور هنا أو اضغط للرفع';
                document.getElementById('publishPagesInput').value = '';

                if (!document.getElementById('publishContinuityMode').checked) {
                    document.getElementById('publishLockToggle').checked = false;
                    togglePublishLock(false);
                }
                onPublishMangaChange(m.id);

            } catch (e) {
                showToast('❌ ' + (e?.message || 'فشل النشر').slice(0, 80));
            }
            hideLoading();
        }

        function switchLoginTab(tab) {
            ['discord','userpass','guest'].forEach(t => {
                document.getElementById('loginTab' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = t === tab ? '' : 'none';
            });
            document.getElementById('tabDiscordBtn').classList.toggle('active', tab === 'discord');
            document.getElementById('tabUserBtn').classList.toggle('active', tab === 'userpass');
            document.getElementById('tabGuestBtn').classList.toggle('active', tab === 'guest');
        }

        let upMode = 'login';
        function setLoginMode(mode) {
            upMode = mode;
            document.getElementById('modeLoginBtn').style.cssText = mode === 'login'
                ? 'flex:1;padding:8px;border-radius:8px;border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;font-family:Cairo,sans-serif;font-weight:bold;font-size:13px;transition:var(--transition);'
                : 'flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-family:Cairo,sans-serif;font-size:13px;transition:var(--transition);';
            document.getElementById('modeRegisterBtn').style.cssText = mode === 'register'
                ? 'flex:1;padding:8px;border-radius:8px;border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;font-family:Cairo,sans-serif;font-weight:bold;font-size:13px;transition:var(--transition);'
                : 'flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-family:Cairo,sans-serif;font-size:13px;transition:var(--transition);';
            document.getElementById('upEmailRow').style.display = mode === 'register' ? '' : 'none';
            document.getElementById('upSubmitBtn').textContent = mode === 'login' ? 'دخول' : 'إنشاء حساب';
        }

        async function handleUserPassAuth() {
            const username = document.getElementById('upUsername').value.trim();
            const password = document.getElementById('upPassword').value;
            const msgEl = document.getElementById('upMsg');
            if (!username || !password) { msgEl.textContent = '⚠️ أدخل اسم المستخدم وكلمة المرور'; return; }
            msgEl.textContent = '⏳ جاري...';

            if (upMode === 'login') {
                try {
                    const fakeEmail = username.replace(/\s+/g, '') + '@abyss.local';
                    const data = await signIn(fakeEmail, password);
                    loggedInUser = { id: data.user?.id || username, name: username, avatar: '', provider: 'email' };
                    authToken = data.access_token;
                    onLoginSuccess();
                    showToast('✅ أهلاً ' + username + ' 👋');
                    msgEl.textContent = '';
                } catch (e) {
                    loggedInUser = { id: 'local_' + username, name: username, avatar: '', provider: 'local' };
                    authToken = null;
                    onLoginSuccess();
                    showToast('👋 أهلاً ' + username);
                    msgEl.textContent = '';
                }
            } else {
                const email = document.getElementById('upEmail').value.trim();
                if (!email) { msgEl.textContent = '⚠️ أدخل البريد الإلكتروني'; return; }
                try {
                    await signUp(email, password);
                    loggedInUser = { id: 'new_' + username, name: username, avatar: '', provider: 'email' };
                    authToken = null;
                    onLoginSuccess();
                    showToast('✅ تم إنشاء الحساب بنجاح 🎉');
                    msgEl.textContent = '';
                } catch (e) {
                    msgEl.textContent = '❌ ' + (e.msg || e.message || 'فشل التسجيل').slice(0, 60);
                }
            }
        }

        // بدء التطبيق
        init();
    </script>
</body>
</html>
